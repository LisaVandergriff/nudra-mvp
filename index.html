<script>
// @ts-check

/* =========================
   DEBUG TAG (top-left label)
========================= */
function debugTag(text){
  return `<div class="debug">${text}</div>`;
}

/* =========================
   URL STATE (SOURCE OF TRUTH)
   Controls WHO and WHERE we are
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");          // message being passed
const mode = params.get("mode");        // mode (date, fate, etc)
const step = parseInt(params.get("step") || "1"); // progression
const accepted = params.get("accepted"); // B has engaged
const bStep = params.get("bStep");      // B is actively responding

/* =========================
   INVITE TEXT (A → B opener)
========================= */
function getInviteText() {
  const invites = [
    "…come play with me",
    "I found something for us",
    "don’t overthink this",
    "just open this",
    "this made me think of you"
  ];
  return invites[Math.floor(Math.random() * invites.length)];
}

/* =========================
   SCRIPT ENGINE (A INIT ONLY)
========================= */
const scripts = {
  fate: [
    ["Flip a coin and commit.", "You decide. No take-backs.", "No thinking—first idea wins."],
    ["Well… now I’m curious.", "You really went with that?", "Alright… I’m in."]
  ],
  reconnect: [
    ["Tell me what’s been on your mind.", "Let’s reset… just us.", "Come sit with me for a minute."],
    ["I’m here… talk to me.", "That pulled me in.", "Don’t disappear now."]
  ],
  date: [
    ["Tonight doesn’t need a plan.", "Don’t make me overthink this.", "You’ve had my attention all day."],
    ["Careful… I might take you up on that.", "You’re starting something.", "What’s next?"]
  ],
  dinner: [
    ["Stay in tonight", "Go out and see what happens", "Surprise me"],
    ["Now I’m invested.", "You always do this.", "Where is this going?"]
  ]
};

/* =========================
   B OPTIONS (INVITE ONLY)
========================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const bOptions = {
  fate: {
    yes: ["Let’s see where this goes","Your move","Alright… surprise me"],
    no: ["Not now… but I’m curious","This isn’t over","Come back to this"]
  },
  reconnect: {
    yes: ["Stay with me","I’m here","Talk to me"],
    no: ["I see you… just not right now.","I want this… just not in this moment.","Give me a minute"]
  },
  date: {
    yes: ["Come closer","Keep going…","I’m listening"],
    no: ["Mmm… bad timing. Don’t stop though.","Not now… but I like this.","Try me again later"]
  },
  dinner: {
    yes: ["Fine… I’m in","Pick for me","Let’s do something easy"],
    no: ["Bad timing… but I like this","Later… don’t lose that energy","Try me again tonight"]
  }
};

/* =========================
   FADE TRANSITION
========================= */
function fadeTo(html){
  const app=document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{app.innerHTML=html;app.style.opacity=1;},200);
}

/* =========================
   A FLOW (INITIATOR)
========================= */
function showHome(){
  fadeTo(`
    ${debugTag("A • HOME")}
    <div style="letter-spacing:4px;font-size:14px;">LURRE</div>
    <h1>Welcome back.<br>Come play with me.</h1>
    <div class="orb" style="opacity:1" onclick="showDirections()"></div>
  `);
}

function showDirections(){
  fadeTo(`
    ${debugTag("A • STEP 1")}
    <h1>What are we feeling?</h1>
    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

function startMode(mode){
  const options=scripts[mode][0];
  let html=`${debugTag("A • STEP 2")}`;
  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',2)">${o}</button>`;
  });
  fadeTo(html);
}

/* =========================
   SEND ENGINE (A ↔ B HANDOFF)
========================= */
function sendChoice(text,mode,nextStep){

  // IMPORTANT: determines direction of flow
  let link;

  if (bStep === "1") {
    // B sending → goes back to A RETURN
    link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}&accepted=true`;
  } else {
    // A sending → goes to B INVITE
    link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}`;
  }

  const inviteText = getInviteText();
  const full = `${inviteText}\n\n${link}`;

  fadeTo(`
    ${debugTag(bStep === "1" ? "B • SEND" : "A • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(full)}'))">Copy</button>
  `);
}

/* =========================
   B FLOW
========================= */

/* STEP 1A — B ENGAGED (YES PATH) */
if(bStep === "1"){
  let html = `${debugTag("B • STEP 1A")}`;
  html += `<div class="hero">${decodeURIComponent(msg)}</div>`;

  const responses = [
    "Don’t stop",
    "You’ve got me",
    "Alright… now what?",
    "Careful… keep going"
  ];

  responses.forEach(o=>{
    html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fadeTo(html);
}

/* B INVITE — FIRST TOUCH */
else if(msg && !accepted && !bStep){

  const pool=bOptions[mode]||bOptions.date;
  const yes=pick(pool.yes);
  const no=pick(pool.no);

  fadeTo(`
    ${debugTag("B • INVITE")}
    <div class="hero">${decodeURIComponent(msg)}</div>

    <div id="buttons" class="buttons">
      <button class="button" onclick="accept()">${yes}</button>
      <button class="button" onclick="goHome()">${no}</button>
    </div>
  `);

  setTimeout(()=>{document.getElementById("buttons").style.opacity=1;},4200);
}

/* =========================
   A RETURN (RESPONSE-DRIVEN)
   B said something → A reacts
========================= */
else if(msg && accepted){

  const reactions = {
    "Don’t stop": [
      "Careful… I might take you up on that.",
      "You’re asking for trouble.",
      "I was hoping you’d say that."
    ],
    "You’ve got me": [
      "Good… don’t lose that feeling.",
      "Then stay right there with me.",
      "That’s exactly where I wanted you."
    ],
    "Alright… now what?": [
      "Now we see how far this goes.",
      "Now you don’t get to back out.",
      "Now it gets interesting."
    ],
    "Careful… keep going": [
      "Careful isn’t really my style.",
      "You might regret that.",
      "Or you might love it."
    ]
  };

  const options = reactions[msg] || [
    "Stay with me.",
    "Don’t disappear now.",
    "I’m not done yet."
  ];

  let html=`${debugTag("A • RETURN")}<div class="hero">${decodeURIComponent(msg)}</div>`;

  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fadeTo(html);
}

/* DEFAULT — BACK TO A */
else{
  showHome();
}

/* =========================
   ACTIONS
========================= */
function accept(){
  window.location.href=`?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&bStep=1`;
}

function goHome(){
  window.location.href="/";
}

</script>
