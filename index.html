<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      margin: 0;
    }
    
  .debug {
  position: fixed;
  top: 10px;
  left: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: rgba(230,210,192,0.6);
  letter-spacing: 1px;
   }
    
    #app {
      transition: opacity 0.4s ease;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 40px;
    }

    .hero {
      font-size: clamp(26px, 4vw, 36px);
      margin-bottom: 20px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(230,210,192,0.35), rgba(230,210,192,0.05));
      box-shadow:
        0 0 25px rgba(230,210,192,0.4),
        0 0 70px rgba(230,210,192,0.2);
      opacity: 0;
      transform: scale(0.9);
    }

    .orb.active {
      animation: flutter 2.8s ease-in-out forwards;
      opacity: 1;
    }

    .orb.fade-out {
      animation: fadeOrb 1.5s ease forwards;
    }

    @keyframes flutter {
      0%   { transform: scale(0.9); opacity: 0; }
      30%  { transform: scale(1.08); }
      55%  { transform: scale(0.98); }
      75%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeOrb {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.85); }
    }

    .whisper {
      font-family: 'Inter', sans-serif;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(10px);
    }

    .whisper.show {
      animation: whisperIn 1.2s ease forwards;
    }

    @keyframes whisperIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
        font-size: 14px;
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        font-size: 18px;
      }
    }

    .buttons {
      margin-top: 30px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: rgba(230,210,192,0.06);
      color: #E6D2C0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .button:hover {
      background: rgba(230,210,192,0.14);
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

function debugTag(text){
return `<div class="debug">${text}</div>`;
}

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");
const bStep = params.get("bStep");  

/* =========================
   INVITE TEXT (NEW FIX)
========================= */
function getInviteText() {
  const invites = [
    "…come play with me",
    "I found something for us",
    "don’t overthink this",
    "just open this",
    "this made me think of you"
  ];
  return invites[Math.floor(Math.random() * invites.length)];
}

/* =========================
   SCRIPT ENGINE (LOCKED)
========================= */
const scripts = {
  fate: [
    ["Flip a coin and commit.", "You decide. No take-backs.", "No thinking—first idea wins."],
    ["Well… now I’m curious.", "You really went with that?", "Alright… I’m in."]
  ],
  reconnect: [
    ["Tell me what’s been on your mind.", "Let’s reset… just us.", "Come sit with me for a minute."],
    ["I’m here… talk to me.", "That pulled me in.", "Don’t disappear now."]
  ],
  date: [
    ["Tonight doesn’t need a plan.", "Don’t make me overthink this.", "You’ve had my attention all day."],
    ["Careful… I might take you up on that.", "You’re starting something.", "What’s next?"]
  ],
  dinner: [
    ["Stay in tonight", "Go out and see what happens", "Surprise me"],
    ["Now I’m invested.", "You always do this.", "Where is this going?"]
  ]
};

/* =========================
   B OPTIONS
========================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const bOptions = {
  fate: {
    yes: ["Let’s see where this goes","Your move","Alright… surprise me"],
    no: ["Not now… but I’m curious","This isn’t over","Come back to this"]
  },
  reconnect: {
    yes: ["Stay with me","I’m here","Talk to me"],
    no: ["I see you… just not right now.","I want this… just not in this moment.","Give me a minute"]
  },
  date: {
    yes: ["Come closer","Keep going…","I’m listening"],
    no: ["Mmm… bad timing. Don’t stop though.","Not now… but I like this.","Try me again later"]
  },
  dinner: {
    yes: ["Fine… I’m in","Pick for me","Let’s do something easy"],
    no: ["Bad timing… but I like this","Later… don’t lose that energy","Try me again tonight"]
  }
};

/* =========================
   FADE
========================= */
function fadeTo(html){
  const app=document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{app.innerHTML=html;app.style.opacity=1;},200);
}

/* =========================
   A FLOW (UNCHANGED)
========================= */
function showHome(){
  fadeTo(`
    ${debugTag("A • HOME")}
    <div style="letter-spacing:4px;font-size:14px;">LURRE</div>
    <h1>Welcome back.<br>Come play with me.</h1>
    <div class="orb" style="opacity:1" onclick="showDirections()"></div>
  `);
}

function showDirections(){
  fadeTo(`
    ${debugTag("A • STEP 1")}
    <h1>What are we feeling?</h1>
    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

function startMode(mode){
  const options=scripts[mode][0];
  let html=`${debugTag("A • STEP 2")}`;
  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',2)">${o}</button>`;
  });
  fadeTo(html);
}

/* =========================
   SEND (FIXED — NO PHRASE)
========================= */
function sendChoice(text,mode,nextStep){

  const link=`https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}`;

  const inviteText = getInviteText();

  const full=`${inviteText}\n\n${link}`;

  fadeTo(`
    ${debugTag(bStep === "1" ? "B • SEND" : "A • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(full)}'))">Copy</button>
  `);
}

/* =========================
   B FLOW (UNCHANGED FOR NOW)
========================= */
 if(bStep === "1"){
  const options = bOptions[mode] || bOptions.date;
  let html = `${debugTag("B • STEP 1A")}`;
  html += `<div class="hero">${decodeURIComponent(msg)}</div>`;
  const responses = [
  "Don’t stop",
  "You’ve got me",
  "Alright… now what?",
  "Careful… keep going"
];

responses.forEach(o=>{
  html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
});
 
  fadeTo(html);
} 
  
else if(msg && !accepted && !bStep){

  const pool=bOptions[mode]||bOptions.date;
  const yes=pick(pool.yes);
  const no=pick(pool.no);

  fadeTo(`
    ${debugTag("B • INVITE")}
    <div class="hero">${decodeURIComponent(msg)}</div>

      <div id="buttons" class="buttons">
      <button class="button" onclick="accept()">${yes}</button>
      <button class="button" onclick="goHome()">${no}</button>
    </div>
  `);

  setTimeout(()=>{document.getElementById("buttons").style.opacity=1;},4200);
}
else if(msg && accepted){

  const options=scripts[mode]?.[step-1]||["…"];
  let html=`${debugTag("A • RETURN (current)")}<div class="hero">${decodeURIComponent(msg)}</div>`;
  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });
  fadeTo(html);
}
else{
  showHome();
}

function accept(){
  window.location.href=`?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&bStep=1`;
}

function goHome(){
  window.location.href="/";
}

</script>

</body>
</html>
