<!DOCTYPE html>
<html>
<head>
  <title>Nudra</title>

  <!-- 📱 MOBILE SCALING (CRITICAL) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

  ////////////////////////////////////////////////////////////
  // 🎨 BASE STYLES
  ////////////////////////////////////////////////////////////

  body {
    background: #000;
    color: #E6D2C6;
    font-family: Georgia, serif;
    text-align: center;
    padding: 80px 20px;
  }

  h1 {
    font-size: clamp(28px, 6vw, 42px);
    margin-bottom: 10px;
  }

  p {
    font-family: Arial, sans-serif;
    font-size: 16px;
    margin-bottom: 40px;
    color: #ccc;
  }

  ////////////////////////////////////////////////////////////
  // 🔥 HERO TEXT (BIG MESSAGE)
  ////////////////////////////////////////////////////////////

  .hero {
    font-size: clamp(28px, 6vw, 42px);
    margin-top: 30px;
    line-height: 1.3;
  }

  ////////////////////////////////////////////////////////////
  // 🔘 BUTTONS (MOBILE FRIENDLY)
  ////////////////////////////////////////////////////////////

  .button {
    display: block;
    width: 90%;
    max-width: 320px;
    margin: 10px auto;
    padding: 16px;
    border-radius: 999px;
    border: none;
    background: #E6D2C6;
    color: #000;
    font-size: 17px;
    cursor: pointer;
    text-decoration: none;
    font-family: Arial, sans-serif;
  }

  ////////////////////////////////////////////////////////////
  // 🧾 RESULT AREA
  ////////////////////////////////////////////////////////////

  #result {
    margin-top: 40px;
    font-size: 22px;
    line-height: 1.4;
  }

  .tone {
    display: block;
    margin-top: 10px;
    font-size: 14px;
    font-style: italic;
    color: #aaa;
    font-family: Arial, sans-serif;
  }

  .section-title {
    font-size: 20px;
    margin-top: 30px;
    color: #ccc;
  }

  </style>
</head>

<body>

<!-- 🏠 DEFAULT HOME VIEW -->
<h1>So… what kind of trouble are we getting into?</h1>
<p>Pick a mood. I’ll take it from there.</p>

<button class="button" onclick="dinnerMode()">🍽️ Dinner / Easy Night</button>
<button class="button" onclick="dateNightMode()">🖤 Date Night</button>
<button class="button" onclick="fateMode()">🎲 Let the Fates Decide</button>
<button class="button" onclick="reconnectMode()">💬 Reconnect</button>

<div id="result">Go on… pick something.</div>

<script>

////////////////////////////////////////////////////////////
// 🔧 HELPER
////////////////////////////////////////////////////////////
function pick(list) {
  return list[Math.floor(Math.random() * list.length)];
}

////////////////////////////////////////////////////////////
// 🔍 URL PARAMS (DRIVES FLOW)
////////////////////////////////////////////////////////////
const params = new URLSearchParams(window.location.search);

const incoming = params.get("msg");
const isReply  = params.get("reply");
const isDecline = params.get("decline");

////////////////////////////////////////////////////////////
// 📩 INCOMING MESSAGE (RECEIVER VIEW)
////////////////////////////////////////////////////////////
if (incoming && !isReply && !isDecline) {

  document.body.innerHTML = `
    <h1>Psst…</h1>

    <div id="result">

      <div class="section-title">
        Someone’s thinking about you.
      </div>

      <div class="hero">
        ${decodeURIComponent(incoming)}
      </div>

      <div class="tone">
        So… do you wanna play?
      </div>

      <br>

      <a href="?reply=true" class="button">
        Why yes I do
      </a>

      <a href="?decline=true&msg=${encodeURIComponent(incoming)}" class="button">
        Not now
      </a>

    </div>
  `;

  throw new Error("stop");
}

////////////////////////////////////////////////////////////
// 👍 YES FLOW (REPLY MODE)
////////////////////////////////////////////////////////////
if (isReply) {

  const responses = [
    "Careful… I might take you up on that.",
    "Alright… but you’re making the first move.",
    "You started this. Don’t disappear now."
  ];

  let html = `
    <h1>Alright… your turn 😏</h1>
    <div id="result">
  `;

  responses.forEach((opt, index) => {
    html += `
      <button class="button" onclick="sendChoice(${index})">
        ${opt}
      </button>
    `;
  });

  html += `</div>`;

  document.body.innerHTML = html;

  window.dateNightOptions = responses;
}

////////////////////////////////////////////////////////////
// 👎 NO FLOW (DECLINE)
////////////////////////////////////////////////////////////
if (isDecline) {

  const polite = "Not tonight… but don’t stop trying 😏";
  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(polite)}`;

  document.body.innerHTML = `
    <h1>Fair enough…</h1>

    <div id="result">

      <a href="sms:?body=${encodeURIComponent(polite + ' ' + link)}" class="button">
        Send response
      </a>

      <a href="mailto:jennifer12555@gmail.com?subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(polite + '\n\nOpen this → ' + link)}" class="button">
        Email response
      </a>

    </div>
  `;
}

////////////////////////////////////////////////////////////
// 🖤 DATE NIGHT (START FLOW)
////////////////////////////////////////////////////////////
function dateNightMode() {

  const options = [
    "You’ve had my attention all day.",
    "Tonight doesn’t need a plan.",
    "Don’t make me overthink this."
  ];

  let html = `<div class="section-title">Pick your move...</div>`;

  options.forEach((opt, index) => {
    html += `
      <button class="button" onclick="sendChoice(${index})">
        ${opt}
      </button>
    `;
  });

  document.getElementById("result").innerHTML = html;
  window.dateNightOptions = options;
}

////////////////////////////////////////////////////////////
// 🚀 SEND MESSAGE (CORE FUNCTION)
////////////////////////////////////////////////////////////
function sendChoice(index) {

  const text = window.dateNightOptions[index];
  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}`;

  document.getElementById("result").innerHTML = "Sending to your person…";

  setTimeout(() => {

    document.getElementById("result").innerHTML =
      "Showing your brave side, I see.<br>" +
      '<span class="tone">' + text + '</span>' +
      `<br><br>

       <a href="sms:?body=${encodeURIComponent(text + ' 😏 ' + link)}" class="button">
         Send it
       </a>

       <a href="mailto:jennifer12555@gmail.com?subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(text + '\n\nOpen this → ' + link)}" class="button">
         Email it
       </a>

       <a href="https://outlook.office.com/mail/deeplink/compose?to=jennifer12555@gmail.com&subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(text + '\n\n' + link)}" target="_blank" class="button">
         Outlook it
       </a>`;

  }, 1200);
}

////////////////////////////////////////////////////////////
// 🍝 DINNER MODE
////////////////////////////////////////////////////////////
function dinnerMode() {
  const actions = ["Go out", "Order takeout", "Cook at home"];
  const cuisines = ["Italian", "Mexican", "Chinese"];
  const tones = ["keep it simple.", "just go with it."];

  const result = pick(actions) + ". " + pick(cuisines) + ".";
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

////////////////////////////////////////////////////////////
// 🎲 FATE MODE
////////////////////////////////////////////////////////////
function fateMode() {
  const chaos = ["Flip a coin", "Ask a stranger"];
  const tones = ["no backing out.", "trust the chaos."];

  const result = pick(chaos);
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

////////////////////////////////////////////////////////////
// 💬 RECONNECT MODE
////////////////////////////////////////////////////////////
function reconnectMode() {
  const prompts = ["Talk about your favorite memory"];
  const tones = ["this one matters."];

  const result = pick(prompts);
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

</script>

</body>
</html>
