<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      transition: opacity 0.6s ease;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 20px;
    }

    .subtle {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #aaa;
      margin: 20px 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .subtle.show {
      opacity: 1;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.3);
      background: transparent;
      color: #E6D2C0;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .button:hover {
      background: rgba(230,210,192,0.08);
      box-shadow: 0 0 18px rgba(230,210,192,0.25);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);
const session = params.get("s");
const mode = params.get("mode");
const accepted = params.get("accepted");

/* =========================
   SESSION STORAGE
========================= */
const sessions = {};

/* =========================
   SCRIPT ENGINE (A FLOW - LOCKED)
========================= */
const scripts = {

  dinner: {
    opener: [
      "Let’s not overthink this.",
      "Easy night… or is it?",
      "You pick… I’ll follow your lead."
    ]
  },

  date: {
    opener: [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ]
  },

  reconnect: {
    opener: [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ]
  },

  fate: {
    opener: [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ]
  }

};

/* =========================
   B MODE EXPERIENCE MAP
========================= */
const bExperience = {

  dinner: {
    line: "Let’s not overthink this.",
    whisper: "… I hope you join me",
    yes: "I’m in",
    no: "Rain check… but I like this"
  },

  date: {
    line: "You’ve had my attention all day.",
    whisper: "… I hope you join me",
    yes: "Come closer",
    no: "Not now… but I like this"
  },

  reconnect: {
    line: "Let’s reset… just us.",
    whisper: "… I hope you join me",
    yes: "I’m here",
    no: "Give me a little time"
  },

  fate: {
    line: "Flip a coin and commit.",
    whisper: "… I hope you join me",
    yes: "Let’s see where this goes",
    no: "Not now… but I’m curious"
  }

};

/* =========================
   INITIAL LOAD
========================= */
if (!session && !mode) {
  showHome();
}
else if (session && !accepted) {
  showBIntro();
}
else if (session && accepted) {
  showBOptions();
}

/* =========================
   HOME (A ENTRY)
========================= */
function showHome() {
  document.getElementById("app").innerHTML = `
    <h1>What are we feeling?</h1>

    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `;
}

/* =========================
   START MODE (A FLOW)
========================= */
function startMode(selectedMode) {

  const options = scripts[selectedMode].opener;

  let html = `<h1>`;

  html += options[0]; // top headline

  html += `</h1>`;

  for (let i = 1; i < options.length; i++) {
    html += `<button class="button" onclick="sendChoice('${selectedMode}')">${options[i]}</button>`;
  }

  document.getElementById("app").innerHTML = html;
}

/* =========================
   SEND LINK (NO PHRASE LEAK)
========================= */
function sendChoice(mode) {

  const id = Math.random().toString(36).substring(2,10);

  sessions[id] = { mode };

  const link = `${window.location.origin}?s=${id}&mode=${mode}`;

  document.getElementById("app").innerHTML = `
    <button class="button" onclick="window.location.href='sms:?body=${link}'">Send</button>
    <button class="button" onclick="copyLink('${link}')">Copy</button>
  `;
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  alert("Copied");
}

/* =========================
   B INTRO (EMOTIONAL ARRIVAL)
========================= */
function showBIntro() {

  const exp = bExperience[mode];

  document.getElementById("app").innerHTML = `
    <h1>${exp.line}</h1>

    <div id="whisper" class="subtle">${exp.whisper}</div>

    <button class="button" onclick="accept()"> ${exp.yes} </button>
    <button class="button" onclick="decline()"> ${exp.no} </button>
  `;

  setTimeout(() => {
    document.getElementById("whisper").classList.add("show");
  }, 1200);
}

/* =========================
   ACCEPT / DECLINE
========================= */
function accept() {
  window.location.href = `${window.location.origin}?s=${session}&mode=${mode}&accepted=true`;
}

function decline() {
  document.getElementById("app").innerHTML = `
    <h1>Another time…</h1>
  `;
}

/* =========================
   B CONTINUATION (PHASE 2)
========================= */
function showBOptions() {

  const exp = bExperience[mode];

  document.getElementById("app").innerHTML = `
    <h1>${exp.line}</h1>

    <div class="subtle show">${exp.whisper}</div>

    <button class="button">Keep going</button>
    <button class="button">Slow down</button>
  `;
}

</script>

</body>
</html>
