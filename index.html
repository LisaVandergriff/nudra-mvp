<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      margin: 0;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 15px;
    }

    .inner {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 20px;
    }

    .subtle {
      font-family: 'Inter', sans-serif;
      color: #888;
      font-size: 14px;
      margin-top: 10px;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: transparent;
      color: #E6D2C0;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .button:hover {
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.02);
    }

    .glow-orb {
      width: 90px;
      height: 90px;
      margin: 0 auto 30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230,210,192,0.9), rgba(230,210,192,0.05));
      box-shadow: 0 0 25px rgba(230,210,192,0.5);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="inner" id="app"></div>
</div>

<script>

/* =========================
   SAFE DECODE
========================= */
function safeDecode(val) {
  try { return decodeURIComponent(val || ""); }
  catch { return val || ""; }
}

/* =========================
   PARAMS
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

const app = document.getElementById("app");

/* =========================
   SCRIPT ENGINE (UNCHANGED CORE)
========================= */
const scripts = {

  reconnect: {
    opener: [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ],
    responses: [
      ["I’m here.", "Talk to me.", "Don’t rush this."],
      ["Stay with me.", "That feels better.", "Keep going."]
    ]
  },

  date: {
    opener: [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ],
    responses: [
      ["Go on…", "I’m listening.", "You’ve got me."],
      ["Okay… now what?", "You started this.", "I’m in."]
    ]
  },

  fate: {
    opener: [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ],
    responses: [
      ["Alright…", "Let’s see.", "You picked this."],
      ["No regrets.", "We’re doing this.", "Let’s go."]
    ]
  }

};

/* =========================
   HOME (A START)
========================= */
function showHome() {
  app.innerHTML = `
    <div class="glow-orb"></div>
    <h1>Welcome back.<br>Come play with me.</h1>

    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `;
}

/* =========================
   A FLOW
========================= */
function startMode(selectedMode) {

  const options = scripts[selectedMode]?.opener || [];

  window.currentMode = selectedMode;
  window.currentOptions = options;

  let html = ``;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  app.innerHTML = html;
}

/* =========================
   SEND
========================= */
function sendChoice(i) {

  const text = window.currentOptions[i];
  const nextStep = step + 1;

  const link = `${window.location.origin}?msg=${encodeURIComponent(text)}&mode=${window.currentMode}&step=${nextStep}`;

  app.innerHTML = `
    <div class="glow-orb"></div>
    <button class="button" onclick="window.location.href='sms:?body=${encodeURIComponent(link)}'">Send</button>
    <button class="button" onclick="copyLink('${link}')">Copy</button>
  `;
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  alert("Copied");
}

/* =========================
   B ENTRY (ONLY NEW PART)
========================= */
function showBEntry() {
  app.innerHTML = `
    <h1 style="font-size:28px; font-weight:400;">
      ${safeDecode(msg)}
    </h1>

    <div class="subtle">…you don’t have to decide anything yet</div>

    <div class="glow-orb"></div>

    <button class="button" onclick="accept()">Stay a minute</button>
    <button class="button" onclick="showHome()">Maybe later</button>
  `;
}

/* =========================
   ACCEPT
========================= */
function accept() {
  window.location.href = `${window.location.origin}?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&accepted=true`;
}

/* =========================
   CONTINUE FLOW (UNCHANGED)
========================= */
function showContinuation() {

  const options = scripts[mode]?.responses[step - 1] || [];

  window.currentMode = mode;
  window.currentOptions = options;

  let html = `<h1>${safeDecode(msg)}</h1>`;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  app.innerHTML = html;
}

/* =========================
   ROUTER (FIXED, NOT CHANGED FLOW)
========================= */
if (!msg) {
  showHome();
}
else if (!accepted) {
  showBEntry();
}
else {
  showContinuation();
}

</script>

</body>
</html>
