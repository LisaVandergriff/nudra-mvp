<!DOCTYPE html>
<html>
<head>
  <title>Nudra</title>

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 10px;
    }

    p, .button, .tone {
      font-family: 'Inter', sans-serif;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 16px;
      border-radius: 999px;
      border: none;
      background: #E6D2C0;
      color: #000;
      font-size: clamp(14px, 4vw, 18px);
      cursor: pointer;
      text-decoration: none;
    }

    #result {
      margin-top: 30px;
      font-size: clamp(20px, 5vw, 30px);
    }

    .tone {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .hero {
      font-size: clamp(28px, 6vw, 44px);
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>So… what kind of trouble are we getting into?</h1>
<p>Pick a mood. I’ll take it from there.</p>

<button class="button" onclick="startMode('dinner')">🍽️ Dinner</button>
<button class="button" onclick="startMode('date')">🖤 Date Night</button>
<button class="button" onclick="startMode('fate')">🎲 Fate</button>
<button class="button" onclick="startMode('reconnect')">💬 Reconnect</button>

<div id="result">Go on… pick something.</div>

<script>

/* =========================
   TRACKING (safe if undefined)
========================= */
function track(event, data = {}) {
  if (window.va) window.va('event', event, data);
}

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const incoming = params.get("msg");
const mode = params.get("mode");
const thread = params.get("thread") || Date.now();

/* =========================
   RESPONSE ENGINE (FIXED)
========================= */
function getResponses(mode) {

  if (mode === "date") {
    return [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ];
  }

  if (mode === "dinner") {
    return [
      "Pick a place. I’m in.",
      "You choose… I’ll handle the rest.",
      "Something easy… then we stay in 😏"
    ];
  }

  if (mode === "fate") {
    return [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ];
  }

  if (mode === "reconnect") {
    return [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ];
  }

  return ["Try again."];
}

/* =========================
   INCOMING FLOW (FIXED)
   NO RETURN / NO BREAKING SCRIPT
========================= */
if (incoming) {

  track("incoming_open", { mode });

  const responses = getResponses(mode);

  document.body.innerHTML = `
    <h1>Showing your brave side, I see.</h1>

    <div id="result">
      <div class="hero">${decodeURIComponent(incoming)}</div>
      <div class="tone">Your turn…</div>
      <br>

      ${responses.map((r, i) => `
        <button class="button" onclick="sendChoice(${i})">${r}</button>
      `).join("")}

    </div>
  `;

  window.currentOptions = responses;
  window.currentMode = mode;

}

/* =========================
   START MODE (INITIATOR)
========================= */
function startMode(selectedMode) {

  track("mode_selected", { mode: selectedMode });

  const options = getResponses(selectedMode);

  window.currentOptions = options;
  window.currentMode = selectedMode;

  renderOptions("Pick your move...", options);
}

/* =========================
   RENDER OPTIONS
========================= */
function renderOptions(title, options) {

  let html = `<div class="tone">${title}</div><br>`;

  options.forEach((opt, index) => {
    html += `<button class="button" onclick="sendChoice(${index})">${opt}</button>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* =========================
   SEND MESSAGE (CORE LOOP)
========================= */
function sendChoice(index) {

  const text = window.currentOptions[index];

  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${window.currentMode}&thread=${thread}`;

  const fullMessage = `${text} 😏\n\n${link}`;

  track("message_sent", { text, mode: window.currentMode });

  document.body.innerHTML = `
    <h1>Send it…</h1>

    <div id="result">

      <div class="tone">${text}</div>

      <br><br>

      <a href="sms:?body=${encodeURIComponent(fullMessage)}" class="button">Send it</a>

      <a href="mailto:?subject=Nudra&body=${encodeURIComponent(fullMessage)}" class="button">Email it</a>

      <button class="button" onclick="copyMessage('${encodeURIComponent(fullMessage)}')">Copy</button>

    </div>
  `;
}

/* =========================
   COPY FUNCTION
========================= */
function copyMessage(encoded) {
  const decoded = decodeURIComponent(encoded);
  navigator.clipboard.writeText(decoded);
  alert("Copied");
}

</script>

</body>
</html>
