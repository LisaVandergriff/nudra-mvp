<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      margin: 0;
    }

    #app {
      transition: opacity 0.3s ease;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 30px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(230,210,192,0.25), rgba(230,210,192,0.05));
      box-shadow:
        0 0 20px rgba(230,210,192,0.3),
        0 0 60px rgba(230,210,192,0.15);
      animation: pulse 3s infinite ease-in-out;
      cursor: pointer;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 14px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: rgba(230,210,192,0.06);
      color: #E6D2C0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .button:hover {
      background: rgba(230,210,192,0.14);
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div id="app">

  <!-- OPEN SCREEN -->
  <div>
    <div style="letter-spacing:4px; font-size:14px;">LURRE</div>
    <h1>Welcome back.<br>Come play with me.</h1>
    <div class="orb" onclick="showDirections()"></div>
  </div>

</div>

<script>

/* =========================
   SCRIPT OPTIONS (NO DUPES)
========================= */
const scripts = {
  fate: [
    "Flip a coin and commit.",
    "You decide. No take-backs.",
    "No thinking—first idea wins."
  ],
  reconnect: [
    "Tell me what’s been on your mind.",
    "Let’s reset… just us.",
    "Come sit with me for a minute."
  ],
  date: [
    "Tonight doesn’t need a plan.",
    "Don’t make me overthink this.",
    "You’ve had my attention all day."
  ],
  dinner: [
    "Stay in tonight",
    "Go out and see what happens",
    "Surprise me"
  ]
};

/* =========================
   FADE TRANSITION
========================= */
function fadeTo(html) {
  const app = document.getElementById("app");
  app.style.opacity = 0;

  setTimeout(() => {
    app.innerHTML = html;
    app.style.opacity = 1;
  }, 200);
}

/* =========================
   STEP 1: DIRECTIONS
========================= */
function showDirections() {
  fadeTo(`
    <h1>What are we feeling?</h1>

    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

/* =========================
   STEP 2: OPTIONS (NO HEADER)
========================= */
function startMode(mode) {

  const options = scripts[mode];

  let html = ``;

  options.forEach(opt => {
    html += `<button class="button" onclick="sendChoice('${opt}')">${opt}</button>`;
  });

  fadeTo(html);
}

/* =========================
   STEP 3: SEND (CLEAN)
========================= */
function sendChoice(text) {

  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}`;

  // IMPORTANT: include phrase in message, not UI
  const fullMessage = `${text}\n\n${link}`;

  fadeTo(`

    <a href="sms:?body=${encodeURIComponent(fullMessage)}" class="button">Send</a>

    <button class="button" onclick="copyMsg('${encodeURIComponent(fullMessage)}')">
      Copy
    </button>

  `);
}

/* =========================
   COPY HELPER
========================= */
function copyMsg(encoded) {
  const decoded = decodeURIComponent(encoded);
  navigator.clipboard.writeText(decoded);
}

</script>

</body>
</html>
