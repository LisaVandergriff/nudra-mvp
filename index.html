<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 10px;
    }

    .subtle {
      font-family: 'Inter', sans-serif;
      color: #aaa;
      font-size: 14px;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 16px;
      border-radius: 999px;
      border: none;
      background: #E6D2C0;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    .hero {
      font-size: 30px;
      margin: 20px 0;
    }

    #result {
      margin-top: 30px;
    }

    /* ✨ Orb */
    .orb {
      width: 120px;
      height: 120px;
      margin: 40px auto;
      border-radius: 50%;
      border: 1px solid #E6D2C0;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
    }

    .orb:hover {
      box-shadow: 0 0 25px rgba(230,210,192,0.4);
    }

    .orb::after {
      content: "";
      width: 6px;
      height: 6px;
      background: #E6D2C0;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const mode = params.get("mode");
let step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

/* =========================
   SCRIPT ENGINE (UNCHANGED)
========================= */
const scripts = {

  dinner: {
    opener: [
      "Pick a place. I’m in.",
      "You choose… I’ll handle the rest.",
      "Something easy… then we stay in 😉"
    ],
    responses: [
      ["That was too easy…", "You didn’t even hesitate 😏", "I like where this is going"],
      ["Alright… now you’ve got my attention", "Careful… I might expect more", "So what happens after?"],
      ["Yeah… we’re not backing out now", "You started this", "This was a good call"]
    ]
  },

  date: {
    opener: [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ],
    responses: [
      ["Careful… I might take you up on that", "You’re starting something here", "Alright… what’s next?"],
      ["You always do this to me", "Okay… I’m listening", "Go on…"],
      ["No backing out now", "You win", "Guess we’re doing this"]
    ]
  },

  reconnect: {
    opener: [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ],
    responses: [
      ["You always know when to do this", "Alright… I’m here", "Talk to me…"],
      ["That’s exactly what I needed", "Don’t disappear now", "Stay with me"],
      ["Yeah… this feels right", "Let’s not lose this", "I’m glad you said something"]
    ]
  },

  fate: {
    opener: [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ],
    responses: [
      ["Well… now I’m curious", "You really went with that?", "Okay… I’m in"],
      ["This could go either way", "You’re dangerous 😂", "Alright… let’s go"],
      ["Guess fate made the call", "No regrets", "We’re doing this"]
    ]
  }

};

/* =========================
   OPENING SCREEN
========================= */
function showOpening() {
  document.getElementById("app").innerHTML = `
    <div class="subtle">LURRE</div>
    <h1>Welcome back.<br>Come play with me.</h1>

    <div class="orb" onclick="showMain()"></div>
  `;
}

/* =========================
   MAIN DECISION SCREEN
========================= */
function showMain() {
  document.getElementById("app").innerHTML = `
    <h1>Let’s not overthink this…</h1>
    <p class="subtle">Just pick a direction.</p>

    <button class="button" onclick="startMode('dinner')">Stay in tonight</button>
    <button class="button" onclick="startMode('date')">Go out and see what happens</button>
    <button class="button" onclick="startMode('fate')">Surprise me</button>
    <button class="button" onclick="startMode('reconnect')">Just us… no distractions</button>

    <div id="result"></div>
  `;
}

/* =========================
   START MODE
========================= */
function startMode(selectedMode) {

  window.currentMode = selectedMode;
  window.currentOptions = scripts[selectedMode].opener;

  render("Pick your move…", window.currentOptions);
}

/* =========================
   RENDER
========================= */
function render(title, options) {

  let html = `<div class="subtle">${title}</div><br>`;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* =========================
   SEND
========================= */
function sendChoice(i) {

  const nextStep = step + 1;

  const link = `https://nudra-mvp.vercel.app/?mode=${window.currentMode}&step=${nextStep}&accepted=true`;

  document.getElementById("app").innerHTML = `
    <h1>Send it…</h1>

    <a href="sms:?body=${encodeURIComponent(link)}" class="button">Send it</a>
    <a href="mailto:?subject=Lurre&body=${encodeURIComponent(link)}" class="button">Email it</a>
  `;
}

/* =========================
   INCOMING FLOW (UNCHANGED)
========================= */
if (mode && !accepted) {

  document.getElementById("app").innerHTML = `
    <h1>Psst…</h1>

    <div class="hero">Someone’s thinking about you.</div>
    <div class="subtle">Do you want to play?</div>

    <a href="?mode=${mode}&step=${step}&accepted=true" class="button">Yes</a>
    <a href="/" class="button">Not now</a>
  `;

} else if (mode && accepted) {

  const script = scripts[mode];

  if (step > script.responses.length) {
    step = script.responses.length;
  }

  const options = script.responses[step - 1];

  window.currentMode = mode;
  window.currentOptions = options;

  document.getElementById("app").innerHTML = `
    <h1>Showing your brave side, I see.</h1>

    <div class="subtle">Your turn…</div>

    <div id="result"></div>
  `;

  render("", options);

} else {

  // 👇 ONLY SHOW OPENING IF NO FLOW
  showOpening();
}

</script>

</body>
</html>
