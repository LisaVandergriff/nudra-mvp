<!DOCTYPE html>
<html>
<head>
  <title>Nudra</title>

  <style>
    body {
      background: #000;
      color: #E6D2C6;
      font-family: Georgia, serif;
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin-bottom: 40px;
      color: #ccc;
    }

    .button {
      display: block;
      width: 260px;
      margin: 10px auto;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: #E6D2C6;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      font-family: Arial, sans-serif;
    }

    #result {
      margin-top: 40px;
      font-size: 26px;
      line-height: 1.4;
    }

    .tone {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-style: italic;
      color: #aaa;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

<h1>So… what kind of trouble are we getting into?</h1>
<p>Pick a mood. I’ll take it from there.</p>

<button class="button" onclick="dinnerMode()">🍽️ Dinner / Easy Night</button>
<button class="button" onclick="dateNightMode()">🖤 Date Night</button>
<button class="button" onclick="fateMode()">🎲 Let the Fates Decide</button>
<button class="button" onclick="reconnectMode()">💬 Reconnect</button>

<div id="result">Go on… pick something.</div>

<script>

////////////////////////////////////////////////////////////
// 🔧 HELPER
////////////////////////////////////////////////////////////
function pick(list) {
  return list[Math.floor(Math.random() * list.length)];
}

////////////////////////////////////////////////////////////
// 🔍 URL STATE HANDLING
////////////////////////////////////////////////////////////
const params = new URLSearchParams(window.location.search);

const incoming = params.get("msg");     // message received
const isReply  = params.get("reply");   // user said YES
const isDecline = params.get("decline");// user said NO

////////////////////////////////////////////////////////////
// 📩 INCOMING MESSAGE (JENN VIEW)
////////////////////////////////////////////////////////////
if (incoming && !isReply && !isDecline) {

  document.body.innerHTML = `
    <h1>Psst…</h1>

    <div id="result">

      <div style="font-size:18px; color:#aaa;">
        Someone’s thinking about you.
      </div>

      <div style="font-size:42px; margin-top:30px;">
        ${decodeURIComponent(incoming)}
      </div>

      <div class="tone" style="margin-top:20px;">
        So… do you wanna play?
      </div>

      <br>

      <a href="?reply=true" class="button">
        Why yes I do
      </a>

      <a href="?decline=true&msg=${encodeURIComponent(incoming)}" class="button">
        Not now
      </a>

    </div>
  `;

  throw new Error("stop");
}

////////////////////////////////////////////////////////////
// 👍 REPLY = YES (JENN BECOMES SENDER)
////////////////////////////////////////////////////////////
if (isReply) {

  const responses = [
    "Careful… I might take you up on that.",
    "Alright… but you’re making the first move.",
    "You started this. Don’t disappear now."
  ];

  let html = "<div>Alright… your turn 😏</div><br>";

  responses.forEach((opt, index) => {
    html += `
      <button class="button" onclick="sendChoice(${index})">
        ${opt}
      </button>
    `;
  });

  document.getElementById("result").innerHTML = html;
  window.dateNightOptions = responses; // reuse send logic
}

////////////////////////////////////////////////////////////
// 👎 DECLINE = NO (SEND POLITE MESSAGE BACK)
////////////////////////////////////////////////////////////
if (isDecline) {

  const polite = "Not tonight… but don’t stop trying 😏";
  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(polite)}`;

  document.getElementById("result").innerHTML = `
    <div>Fair enough… we’ll behave (for now).</div>

    <br><br>

    <a href="sms:?body=${encodeURIComponent(polite + ' ' + link)}" class="button">
      Send response
    </a>

    <a href="mailto:jennifer12555@gmail.com?subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(polite + '\n\n' + link)}" class="button">
      Email response
    </a>
  `;
}

////////////////////////////////////////////////////////////
// 🍝 DINNER MODE
////////////////////////////////////////////////////////////
function dinnerMode() {
  const actions = ["Go out", "Order takeout", "Cook at home", "Quick meal", "Leftovers", "Try something new"];
  const cuisines = ["Italian", "Mexican", "Chinese", "Japanese", "American", "Mediterranean", "Comfort food"];
  const tones = ["no arguing.", "you know what you’re doing.", "keep it simple.", "just go with it.", "don’t overthink it."];

  const result = pick(actions) + ". " + pick(cuisines) + ".";
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

////////////////////////////////////////////////////////////
// 🖤 DATE NIGHT MODE
////////////////////////////////////////////////////////////
function dateNightMode() {
  const options = [
    "You’ve had my attention all day.",
    "Tonight doesn’t need a plan.",
    "Don’t make me overthink this."
  ];

  let html = "<div>Pick your move...</div><br>";

  options.forEach((opt, index) => {
    html += `
      <button class="button" onclick="sendChoice(${index})">
        ${opt}
      </button>
    `;
  });

  document.getElementById("result").innerHTML = html;
  window.dateNightOptions = options;
}

////////////////////////////////////////////////////////////
// 🚀 SEND ACTION (YOU → JENN)
////////////////////////////////////////////////////////////
function sendChoice(index) {

  const text = window.dateNightOptions[index];
  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}`;

  document.getElementById("result").innerHTML = "Sending to your person…";

  setTimeout(() => {

    document.getElementById("result").innerHTML =
      "Showing your brave side, I see.<br>" +
      '<span class="tone">' + text + '</span>' +
      `<br><br>

       <a href="sms:?body=${encodeURIComponent(text + ' 😏 ' + link)}" class="button">
         Text Jenn
       </a>

       <a href="mailto:jennifer12555@gmail.com?subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(text + '\n\n' + link)}" class="button">
         Email Jenn
       </a>

       <a href="https://outlook.office.com/mail/deeplink/compose?to=jennifer12555@gmail.com&subject=${encodeURIComponent('Nudra 😏')}&body=${encodeURIComponent(text + '\n\n' + link)}" target="_blank" class="button">
         Outlook Jenn
       </a>`;

  }, 1200);
}

////////////////////////////////////////////////////////////
// 🎲 FATE MODE
////////////////////////////////////////////////////////////
function fateMode() {
  const chaos = [
    "Flip a coin and commit",
    "First place you both think of wins",
    "Ask a stranger. Seriously.",
    "Close your eyes and point at a map",
    "Let the other person decide completely"
  ];

  const tones = [
    "no backing out.",
    "you agreed to this.",
    "trust the chaos.",
    "this is happening.",
    "don’t question it."
  ];

  const result = pick(chaos) + ".";
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

////////////////////////////////////////////////////////////
// 💬 RECONNECT MODE
////////////////////////////////////////////////////////////
function reconnectMode() {
  const prompts = [
    "Ask: what’s been on your mind lately?",
    "Talk about your favorite memory together",
    "Say something you haven’t said in a while",
    "Ask what they need more of right now",
    "Sit together and just be for a minute"
  ];

  const tones = [
    "take your time.",
    "be honest.",
    "no distractions.",
    "just listen.",
    "this one matters."
  ];

  const result = pick(prompts);
  document.getElementById("result").innerHTML =
    result + '<span class="tone">' + pick(tones) + '</span>';
}

</script>

</body>
</html>
