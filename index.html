<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .brand {
      letter-spacing: 8px;
      font-size: 18px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .hero {
      font-size: clamp(26px, 5vw, 36px);
      text-align: center;
      margin-bottom: 40px;
    }

    .tone {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }

    .button {
      font-family: 'Inter', sans-serif;
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: #E6D2C0;
      color: #000;
      text-align: center;
      text-decoration: none;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(230,210,192,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(230,210,192,0.2);
      cursor: pointer;
    }

    #app {
      padding: 30px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

/* =========================
   SCRIPT ENGINE (FINAL)
========================= */
const scripts = {

  reconnect: {
    opener: [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ],
    responses: [
      ["You always know how to pull me in.", "Alright… I’m here.", "Talk to me…"],
      ["That’s exactly what I needed.", "Don’t disappear now.", "Stay with me."],
      ["Yeah… this feels right.", "Let’s not lose this.", "I’m glad you said something."]
    ]
  },

  date: {
    opener: [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ],
    responses: [
      ["Careful… I might take you up on that.", "You’re starting something here.", "Alright… what’s next?"],
      ["You always pull me in like this.", "Okay… I’m listening.", "Go on…"],
      ["No backing out now.", "You win.", "Guess we’re doing this."]
    ]
  },

  dinner: {
    opener: [
      "Let’s not overthink this—pick a place.",
      "You pick dinner… I’ll make the rest interesting.",
      "Easy night… or is it?"
    ],
    responses: [
      ["Pick a place. I’m in.", "You choose… I’ll handle the rest.", "Something easy… then we stay in 😉"],
      ["Alright… now I’m curious.", "You always do this to me.", "So what happens after dinner?"],
      ["Guess we’re committed now.", "No backing out.", "Yeah… this was a good call."]
    ]
  },

  fate: {
    opener: [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ],
    responses: [
      ["Well… now I’m curious.", "You really went with that?", "Okay… I’m in."],
      ["This is either genius or chaos.", "You’re dangerous 😂", "Alright… let’s go"],
      ["Guess fate made the call.", "No regrets.", "We’re doing this."]
    ]
  }

};

/* =========================
   STEP ENGINE (FIXED)
========================= */
function getStepOptions(mode, step) {

  const sets = scripts[mode].responses;

  const index = Math.floor((step - 2) / 2);

  if (index < sets.length) return sets[index];

  return sets[sets.length - 1];
}

/* =========================
   LANDING SCREEN
========================= */
function renderLanding() {
  document.getElementById("app").innerHTML = `
    <div class="center">

      <div class="brand">LURRE</div>

      <div class="hero">
        Welcome back.<br>
        Come play with me.
      </div>

      <div class="orb" onclick="enterApp()">⟡</div>

    </div>
  `;
}

/* =========================
   MODE SELECT
========================= */
function enterApp() {
  document.getElementById("app").innerHTML = `
    <div class="hero">What are we feeling?</div>

    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>

    <div id="result"></div>
  `;
}

/* =========================
   INITIATOR FLOW (A)
========================= */
function startMode(selectedMode) {

  const options = scripts[selectedMode].opener;

  window.currentMode = selectedMode;
  window.currentOptions = options;

  renderOptions(options, "Pick your move…");
}

/* =========================
   RENDER OPTIONS
========================= */
function renderOptions(options, title) {

  let html = `<div class="tone">${title}</div><br>`;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* =========================
   SEND MESSAGE
========================= */
function sendChoice(i) {

  const text = window.currentOptions[i];
  const nextStep = step + 1;

  const link = `${location.origin}?msg=${encodeURIComponent(text)}&mode=${window.currentMode}&step=${nextStep}&accepted=true`;

  document.getElementById("app").innerHTML = `
    <div class="hero">${text}</div>

    <a href="sms:?body=${encodeURIComponent(link)}" class="button">Send it</a>
    <a href="mailto:?subject=Lurre&body=${encodeURIComponent(link)}" class="button">Email it</a>
  `;
}

/* =========================
   INCOMING FLOW (B)
========================= */

if (msg && !accepted) {

  document.getElementById("app").innerHTML = `
    <div class="hero">${decodeURIComponent(msg)}</div>
    <div class="tone">Do you want to play?</div>

    <a href="?msg=${encodeURIComponent(msg)}&mode=${mode}&step=2&accepted=true" class="button">Yes</a>
    <a href="/" class="button">Not now</a>
  `;

}
else if (msg && accepted) {

  const options = getStepOptions(mode, step);

  window.currentMode = mode;
  window.currentOptions = options;

  document.getElementById("app").innerHTML = `
    <div class="hero">${decodeURIComponent(msg)}</div>
    <div class="tone">Your turn…</div>

    <div id="result"></div>
  `;

  renderOptions(options, "");
}
else {
  renderLanding();
}

</script>

</body>
</html>
