<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      margin: 0;
    }

    #app {
      transition: opacity 0.4s ease;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 40px;
    }

    .hero {
      font-size: clamp(26px, 4vw, 36px);
      margin-bottom: 20px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(230,210,192,0.25), rgba(230,210,192,0.05));
      box-shadow:
        0 0 20px rgba(230,210,192,0.3),
        0 0 60px rgba(230,210,192,0.15);
      animation: pulse 3.5s infinite ease-in-out;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    .whisper {
      font-size: 14px;
      color: rgba(230,210,192,0.6);
      font-family: 'Inter', sans-serif;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .buttons {
      margin-top: 30px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: rgba(230,210,192,0.06);
      color: #E6D2C0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .button:hover {
      background: rgba(230,210,192,0.14);
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

/* =========================
   SCRIPT ENGINE (LOCKED)
========================= */
const scripts = {
  fate: [
    ["Flip a coin and commit.", "You decide. No take-backs.", "No thinking—first idea wins."],
    ["Well… now I’m curious.", "You really went with that?", "Alright… I’m in."]
  ],
  reconnect: [
    ["Tell me what’s been on your mind.", "Let’s reset… just us.", "Come sit with me for a minute."],
    ["I’m here… talk to me.", "That pulled me in.", "Don’t disappear now."]
  ],
  date: [
    ["Tonight doesn’t need a plan.", "Don’t make me overthink this.", "You’ve had my attention all day."],
    ["Careful… I might take you up on that.", "You’re starting something.", "What’s next?"]
  ],
  dinner: [
    ["Stay in tonight", "Go out and see what happens", "Surprise me"],
    ["Now I’m invested.", "You always do this.", "Where is this going?"]
  ]
};

/* =========================
   WEIGHTED RANDOM
========================= */
function pickWeighted(list) {
  const expanded = [];
  list.forEach(item => {
    for (let i = 0; i < item.weight; i++) {
      expanded.push(item.text);
    }
  });
  return expanded[Math.floor(Math.random() * expanded.length)];
}

/* =========================
   B OPTIONS (WEIGHTED)
========================= */
const bOptions = {
  fate: {
    yes: [
      { text: "Let’s see where this goes", weight: 3 },
      { text: "Your move", weight: 2 },
      { text: "Alright… surprise me", weight: 1 }
    ],
    no: [
      { text: "Not now… but I’m curious", weight: 3 },
      { text: "This isn’t over", weight: 2 },
      { text: "Come back to this", weight: 1 }
    ]
  },
  reconnect: {
    yes: [
      { text: "Stay with me", weight: 3 },
      { text: "I’m here", weight: 2 },
      { text: "Talk to me", weight: 1 }
    ],
    no: [
      { text: "I see you… just not right now.", weight: 3 },
      { text: "I want this… just not in this moment.", weight: 2 },
      { text: "Give me a minute", weight: 1 }
    ]
  },
  date: {
    yes: [
      { text: "Come closer", weight: 3 },
      { text: "Keep going…", weight: 2 },
      { text: "I’m listening", weight: 1 }
    ],
    no: [
      { text: "Mmm… bad timing. Don’t stop though.", weight: 3 },
      { text: "Not now… but I like where this is going.", weight: 2 },
      { text: "Try me again later", weight: 1 }
    ]
  },
  dinner: {
    yes: [
      { text: "Fine… I’m in", weight: 3 },
      { text: "Pick for me", weight: 2 },
      { text: "Let’s do something easy", weight: 1 }
    ],
    no: [
      { text: "Bad timing… but I like this", weight: 3 },
      { text: "Later… don’t lose that energy", weight: 2 },
      { text: "Try me again tonight", weight: 1 }
    ]
  }
};

/* =========================
   FADE
========================= */
function fadeTo(html) {
  const app = document.getElementById("app");
  app.style.opacity = 0;

  setTimeout(() => {
    app.innerHTML = html;
    app.style.opacity = 1;
  }, 200);
}

/* =========================
   A FLOW (LOCKED)
========================= */
function showHome() {
  fadeTo(`
    <div style="letter-spacing:4px; font-size:14px;">LURRE</div>
    <h1>Welcome back.<br>Come play with me.</h1>
    <div class="orb" style="opacity:1" onclick="showDirections()"></div>
  `);
}

function showDirections() {
  fadeTo(`
    <h1>What are we feeling?</h1>
    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

function startMode(selectedMode) {
  const options = scripts[selectedMode][0];

  let html = ``;

  options.forEach(opt => {
    html += `<button class="button" onclick="sendChoice('${opt}', '${selectedMode}', 2)">${opt}</button>`;
  });

  fadeTo(html);
}

function sendChoice(text, mode, nextStep) {
  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}`;
  const fullMessage = `${text}\n\n${link}`;

  fadeTo(`
    <a href="sms:?body=${encodeURIComponent(fullMessage)}" class="button">Send</a>
    <button class="button" onclick="copyMsg('${encodeURIComponent(fullMessage)}')">Copy</button>
  `);
}

function copyMsg(encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded));
}

/* =========================
   B FLOW (SLOW BURN)
========================= */
if (msg && !accepted) {

  const pool = bOptions[mode] || bOptions["date"];
  const yesText = pickWeighted(pool.yes);
  const noText = pickWeighted(pool.no);

  fadeTo(`
    <div class="hero">${decodeURIComponent(msg)}</div>
    <div id="orb" class="orb"></div>
    <div id="whisper" class="whisper">…I hope you join me</div>

    <div id="buttons" class="buttons">
      <button class="button" onclick="accept()">${yesText}</button>
      <button class="button" onclick="goHome()">${noText}</button>
    </div>
  `);

  // staged reveal
  setTimeout(() => {
    document.getElementById("orb").style.opacity = 1;
  }, 600);

  setTimeout(() => {
    document.getElementById("whisper").style.opacity = 1;
  }, 1600);

  setTimeout(() => {
    document.getElementById("buttons").style.opacity = 1;
  }, 2600);

}
else if (msg && accepted) {

  const options = scripts[mode]?.[step - 1] || ["…"];

  let html = `<div class="hero">${decodeURIComponent(msg)}</div>`;

  options.forEach(opt => {
    html += `<button class="button" onclick="sendChoice('${opt}', '${mode}', ${step + 1})">${opt}</button>`;
  });

  fadeTo(html);

}
else {
  showHome();
}

/* =========================
   NAV
========================= */
function accept() {
  window.location.href = `?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&accepted=true`;
}

function goHome() {
  window.location.href = "/";
}

</script>

</body>
</html>
