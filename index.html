<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 20px;
    }

    .subtle {
      font-family: 'Inter', sans-serif;
      color: #888;
      font-size: 14px;
      margin-top: 10px;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: transparent;
      color: #E6D2C0;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .button:hover {
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.03);
    }

    .glow-orb {
      width: 90px;
      height: 90px;
      margin: 40px auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230,210,192,0.9), rgba(230,210,192,0.05));
      box-shadow: 0 0 25px rgba(230,210,192,0.5);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.1); opacity: 1; }
    }

  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

/* =========================
   SCRIPT ENGINE
========================= */
const scripts = {

  reconnect: {
    opener: [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ],
    responses: [
      ["I’m here.", "Talk to me.", "Don’t rush this."],
      ["That feels better already.", "Stay with me.", "Keep going."],
      ["Yeah… this matters.", "Don’t lose this.", "I’m glad you stayed."]
    ]
  },

  date: {
    opener: [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ],
    responses: [
      ["Careful… I’m listening.", "Go on…", "You’ve got my attention."],
      ["You always do this to me.", "Okay… now what?", "I’m in."],
      ["No backing out now.", "You win.", "Let’s see where this goes."]
    ]
  },

  fate: {
    opener: [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ],
    responses: [
      ["Alright… I’ll bite.", "You picked this.", "Let’s see."],
      ["This could go anywhere.", "You’re bold.", "I like it."],
      ["No regrets now.", "We’re doing this.", "Let’s go."]
    ]
  }

};

/* =========================
   RENDER
========================= */
const app = document.getElementById("app");

function renderHTML(html) {
  app.innerHTML = html;
}

/* =========================
   A FLOW (START)
========================= */
function startMode(selectedMode) {
  const options = scripts[selectedMode].opener;

  window.currentMode = selectedMode;
  window.currentOptions = options;

  renderOptions(options);
}

/* =========================
   OPTIONS
========================= */
function renderOptions(options) {
  let html = `<h1></h1>`;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  renderHTML(html);
}

/* =========================
   SEND
========================= */
function sendChoice(i) {

  const text = window.currentOptions[i];
  const nextStep = step + 1;

  const link = `${window.location.origin}?msg=${encodeURIComponent(text)}&mode=${window.currentMode}&step=${nextStep}`;

  renderHTML(`
    <div class="glow-orb"></div>
    <button class="button" onclick="window.location.href='sms:?body=${encodeURIComponent(link)}'">Send</button>
    <button class="button" onclick="copyLink('${link}')">Copy</button>
  `);
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  alert("Link copied");
}

/* =========================
   B FIRST EXPERIENCE (🔥 KEY)
========================= */
if (msg && !accepted) {

  renderHTML(`
    <h1 style="font-size:28px; font-weight:400;">
      ${decodeURIComponent(msg)}
    </h1>

    <div class="subtle">…you don’t have to decide anything yet</div>

    <div class="glow-orb"></div>

    <button class="button" onclick="accept()">Stay a minute</button>
    <button class="button" onclick="window.location.href='/'">Maybe later</button>
  `);

}

/* =========================
   ACCEPT FLOW
========================= */
function accept() {
  const url = `?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&accepted=true`;
  window.location.href = url;
}

/* =========================
   CONTINUATION
========================= */
else if (msg && accepted) {

  const options = scripts[mode].responses[step - 1] || [];

  window.currentMode = mode;
  window.currentOptions = options;

  let html = `
    <h1>${decodeURIComponent(msg)}</h1>
  `;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  renderHTML(html);
}

/* =========================
   DEFAULT LANDING
========================= */
else {

  renderHTML(`
    <div class="glow-orb"></div>

    <h1>Welcome back.<br>Come play with me.</h1>

    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

</script>

</body>
</html>
