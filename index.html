<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      margin: 0;
    }

    #app { transition: opacity 0.4s ease; }

    .hero { font-size: clamp(26px, 4vw, 36px); margin-bottom: 20px; }

    .debug {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: Inter, sans-serif;
      font-size: 12px;
      color: #aaa;
      opacity: 0.6;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(230,210,192,0.35), rgba(230,210,192,0.05));
      box-shadow: 0 0 25px rgba(230,210,192,0.4);
    }

    .whisper {
      font-family: 'Inter';
      opacity: 0;
      transform: translateY(10px);
    }

    .whisper.show {
      animation: fadeIn 1.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .buttons { margin-top: 30px; opacity: 0; transition: .8s; }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,.25);
      background: rgba(230,210,192,.06);
      color: #E6D2C0;
      font-family: 'Inter';
      cursor: pointer;
    }
  </style>
</head>

<body>
<div id="app"></div>

<script>

/* =========================
   DEBUG
========================= */
function debugTag(t){ return `<div class="debug">${t}</div>`; }

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");
const bloop = params.get("bloop");

/* =========================
   HELPERS
========================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* =========================
   SCRIPT ENGINE
========================= */
const scripts = {
  fate: [
    ["Flip a coin and commit.", "You decide. No take-backs.", "No thinking—first idea wins."],
    ["Well… now I’m curious.", "You really went with that?", "Alright… I’m in."]
  ]
};

/* =========================
   FADE
========================= */
function fadeTo(html){
  const app=document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{app.innerHTML=html;app.style.opacity=1;},200);
}

/* =========================
   A FLOW (UNCHANGED)
========================= */
function showHome(){
  fadeTo(`
    ${debugTag("A • HOME")}
    <h1>Welcome back</h1>
    <div class="orb" onclick="showDirections()"></div>
  `);
}

function showDirections(){
  fadeTo(`
    ${debugTag("A • STEP 1")}
    <h1>What are we feeling?</h1>
    <button class="button" onclick="startMode('fate')">Fate</button>
  `);
}

function startMode(mode){
  const options = scripts[mode]?.[0] || ["Start"];
  let html = `${debugTag("A • STEP 2")}`;

  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',2)">${o}</button>`;
  });

  fadeTo(html);
}

/* =========================
   SEND (UNCHANGED COPY)
========================= */
function sendChoice(text,mode,nextStep){

  const link=`https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}`;
  const full=`just open this\n\n${link}`;

  fadeTo(`
    ${debugTag("A • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(full)}'))">Copy</button>
  `);
}

/* =========================
   B INVITE (UNCHANGED)
========================= */
if(msg && !accepted && !bloop){

  fadeTo(`
    ${debugTag("B • INVITE")}
    <div class="hero">${decodeURIComponent(msg)}</div>

    <div id="whisper" class="whisper">…I hope you join me</div>

    <div id="buttons" class="buttons">
      <button class="button" onclick="accept()">Yes</button>
      <button class="button" onclick="goHome()">Not now</button>
    </div>
  `);

  setTimeout(()=>document.getElementById("whisper").classList.add("show"),2000);
  setTimeout(()=>document.getElementById("buttons").style.opacity=1,4200);
}

/* =========================
   ✅ NEW: B RESPONSE (SAFE)
========================= */
else if(bloop){

  const origin = decodeURIComponent(params.get("origin") || msg || "");
  const options = scripts[mode]?.[1] || ["Keep going…","Try again","…"];

  let html = `
    ${debugTag("B • RESPONSE")}
    <div class="hero">${origin}</div>
  `;

  options.forEach(o=>{
    html += `<button class="button" onclick="bSend('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fadeTo(html);
}

/* =========================
   B SEND
========================= */
function bSend(text,mode,next){

  const link=`https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${next}&accepted=true`;
  const full=`${text}\n\n${link}`;

  fadeTo(`
    ${debugTag("B • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(full)}'))">Copy</button>
  `);
}

/* =========================
   A CONTINUE
========================= */
else if(msg && accepted){

  const options = scripts[mode]?.[step-1] || ["…"];

  let html = `${debugTag(`A • STEP ${step}`)}<div class="hero">${decodeURIComponent(msg)}</div>`;

  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fadeTo(html);
}

/* =========================
   DEFAULT
========================= */
else{
  showHome();
}

/* =========================
   ACTIONS
========================= */
function accept(){
  window.location.href=`?mode=${mode}&step=${step}&bloop=1&origin=${encodeURIComponent(msg)}`;
}

function goHome(){
  window.location.href="/";
}

</script>
</body>
</html>
