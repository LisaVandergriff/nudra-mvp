<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background:#000;
      color:#E6D2C0;
      font-family:'Cormorant Garamond', serif;
      text-align:center;
      padding:40px 15px;
      margin:0;
    }

    #app { transition: opacity .4s ease; }

    .hero { font-size: clamp(26px,4vw,36px); margin-bottom:20px; }

    .debug {
      position:fixed; top:10px; left:10px;
      font-family:Inter; font-size:12px;
      color:#aaa; opacity:.6;
    }

    .orb {
      width:120px;height:120px;border-radius:50%;
      margin:40px auto;
      background:radial-gradient(circle,rgba(230,210,192,.35),rgba(230,210,192,.05));
      box-shadow:0 0 25px rgba(230,210,192,.4);
    }

    .whisper {
      font-family:'Inter';
      opacity:0;
      transform:translateY(10px);
    }

    .whisper.show {
      animation: fadeIn 1.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity:1; transform:translateY(0); }
    }

    .buttons { margin-top:30px; opacity:0; transition:.8s; }

    .button {
      display:block;
      width:90%;max-width:320px;
      margin:12px auto;
      padding:16px;
      border-radius:999px;
      border:1px solid rgba(230,210,192,.25);
      background:rgba(230,210,192,.06);
      color:#E6D2C0;
      font-family:'Inter';
      cursor:pointer;
    }
  </style>
</head>

<body>
<div id="app"></div>

<script>

/* =========================
   DEBUG
========================= */
function debugTag(t){ return `<div class="debug">${t}</div>`; }

/* =========================
   URL STATE
========================= */
const p = new URLSearchParams(location.search);

const msg = p.get("msg");
const mode = p.get("mode");
const step = parseInt(p.get("step")||1);
const accepted = p.get("accepted");
const bloop = p.get("bloop");

/* =========================
   HELPERS
========================= */
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

/* =========================
   SCRIPT ENGINE
========================= */
const scripts = {
  fate:[
    ["Flip a coin and commit.","You decide.","No thinking—first idea wins."],
    ["Well… now I’m curious.","You really went with that?","Alright… I’m in."]
  ]
};

/* =========================
   FADE
========================= */
function fade(html){
  const app = document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{app.innerHTML=html;app.style.opacity=1;},200);
}

/* =========================
   A FLOW (LOCKED)
========================= */
function home(){
  fade(`
    ${debugTag("A • HOME")}
    <h1>Welcome back</h1>
    <div class="orb" onclick="modes()"></div>
  `);
}

function modes(){
  fade(`
    ${debugTag("A • STEP 1")}
    <h1>What are we feeling?</h1>
    <button class="button" onclick="start('fate')">Fate</button>
  `);
}

function start(m){
  let html = `${debugTag("A • STEP 2")}`;
  scripts[m][0].forEach(o=>{
    html+=`<button class="button" onclick="send('${o}','${m}',2)">${o}</button>`;
  });
  fade(html);
}

/* =========================
   A SEND (FIXED COPY)
========================= */
function send(text,mode,next){

  const link=`https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${next}`;

  const full=`just open this\n\n${link}`;

  fade(`
    ${debugTag("A • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="copyText(\`${full}\`)">Copy</button>
  `);
}

/* =========================
   COPY (REAL FIX)
========================= */
function copyText(t){
  navigator.clipboard.writeText(t)
    .then(()=>alert("Copied"))
    .catch(()=>alert("Copy failed"));
}

/* =========================
   B INVITE
========================= */
if(msg && !accepted && !bloop){

  fade(`
    ${debugTag("B • INVITE")}
    <div class="hero">${decodeURIComponent(msg)}</div>
    <div id="w" class="whisper">…I hope you join me</div>

    <div id="btn" class="buttons">
      <button class="button" onclick="accept()">Yes</button>
      <button class="button" onclick="home()">Not now</button>
    </div>
  `);

  setTimeout(()=>w.classList.add("show"),2000);
  setTimeout(()=>btn.style.opacity=1,4000);
}

/* =========================
   B RESPONSE (NEW)
========================= */
else if(bloop){

  const origin = decodeURIComponent(p.get("origin") || "");

  let html = `
    ${debugTag("B • RESPONSE")}
    <div class="hero">${origin}</div>
  `;

  scripts[mode][1].forEach(o=>{
    html+=`<button class="button" onclick="bSend('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fade(html);
}

/* =========================
   B SEND → BACK TO A
========================= */
function bSend(text,mode,next){

  const link=`https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&step=${next}&accepted=true`;

  const full=`${text}\n\n${link}`;

  fade(`
    ${debugTag("B • SEND")}
    <a href="sms:?body=${encodeURIComponent(full)}" class="button">Send</a>
    <button class="button" onclick="copyText(\`${full}\`)">Copy</button>
  `);
}

/* =========================
   A CONTINUE
========================= */
else if(msg && accepted){

  let html = `
    ${debugTag("A • STEP "+step)}
    <div class="hero">${decodeURIComponent(msg)}</div>
  `;

  scripts[mode][1].forEach(o=>{
    html+=`<button class="button" onclick="send('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fade(html);
}

/* =========================
   DEFAULT
========================= */
else{
  home();
}

/* =========================
   ACTIONS
========================= */
function accept(){
  location.href=`?mode=${mode}&step=${step}&bloop=1&origin=${encodeURIComponent(msg)}`;
}

</script>
</body>
</html>
