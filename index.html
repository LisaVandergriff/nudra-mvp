<!DOCTYPE html>
<html>
<head>
  <title>Nudra</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Optional Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      background: #000;
      color: #E6D2C6;
      font-family: Georgia, serif;
      text-align: center;
      padding: 40px 15px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      font-family: Arial, sans-serif;
      color: #ccc;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 16px;
      border-radius: 999px;
      background: #E6D2C6;
      color: #000;
      text-decoration: none;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
    }

    .tone {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }

    .hero {
      font-size: 32px;
      margin-top: 20px;
    }

    .subtle {
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h1>So… what kind of trouble are we getting into?</h1>
<p>Pick a mood. I’ll take it from there.</p>

<button class="button" onclick="startMode('dinner')">🍽️ Dinner</button>
<button class="button" onclick="startMode('date')">🖤 Date Night</button>
<button class="button" onclick="startMode('fate')">🎲 Fate</button>
<button class="button" onclick="startMode('reconnect')">💬 Reconnect</button>

<div id="result">Go on… pick something.</div>

<script>

/* =========================
   GLOBAL STATE
========================= */
window.currentMode = null;
window.currentOptions = [];

/* =========================
   URL PARAMS
========================= */
const params = new URLSearchParams(window.location.search);

const incoming = params.get("msg");
const incomingMode = params.get("mode");
const threadId = params.get("thread") || Date.now();

/* =========================
   TRACKING
========================= */
function track(event, data = {}) {
  console.log("📊", event, data);
  if (window.va) window.va('event', event, data);
}

console.log("Page loaded", { incoming, incomingMode, threadId });

/* =========================
   INCOMING MESSAGE VIEW
========================= */
if (incoming) {

  track("incoming_open", { threadId, mode: incomingMode });

  document.body.innerHTML = `
    <h1>Psst…</h1>

    <div id="result">

      <div class="subtle">Someone’s thinking about you.</div>

      <div class="hero">
        ${decodeURIComponent(incoming)}
      </div>

      <div class="tone">
        So… do you wanna play?
      </div>

      <br>

      <a href="?reply=true&mode=${incomingMode}&thread=${threadId}" class="button">
        Why yes I do
      </a>

      <a href="?decline=true&mode=${incomingMode}&thread=${threadId}" class="button">
        Not now
      </a>

    </div>
  `;

  throw new Error("stop execution");
}

/* =========================
   YES FLOW
========================= */
if (params.get("reply")) {

  track("clicked_yes", { threadId, mode: incomingMode });

  const responses = [
    "Careful… I might take you up on that.",
    "Alright… but you’re making the first move.",
    "You started this. Don’t disappear now."
  ];

  renderOptions(responses, incomingMode);
}

/* =========================
   NO FLOW
========================= */
if (params.get("decline")) {

  track("clicked_no", { threadId, mode: incomingMode });

  const text = "Not tonight… but don’t stop trying 😏";
  const link = buildLink(text, incomingMode);

  renderSendScreen(text, link);
}

/* =========================
   START MODE
========================= */
function startMode(mode) {

  window.currentMode = mode;

  track("mode_selected", { mode });

  let options = [];

  if (mode === "date") {
    options = [
      "You’ve had my attention all day.",
      "Tonight doesn’t need a plan.",
      "Don’t make me overthink this."
    ];
  }

  if (mode === "dinner") {
    options = [
      "Pick a place. I’m in.",
      "You choose… I’ll handle the rest.",
      "Something easy… then we stay in 😏"
    ];
  }

  if (mode === "fate") {
    options = [
      "No thinking—first idea wins.",
      "Flip a coin and commit.",
      "You decide. No take-backs."
    ];
  }

  if (mode === "reconnect") {
    options = [
      "Come sit with me for a minute.",
      "Tell me what’s been on your mind.",
      "Let’s reset… just us."
    ];
  }

  renderOptions(options, mode);
}

/* =========================
   RENDER OPTIONS
========================= */
function renderOptions(options, mode) {

  window.currentOptions = options;
  window.currentMode = mode;

  let html = "";

  options.forEach((opt, index) => {
    html += `<button class="button" onclick="sendChoice(${index})">${opt}</button>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* =========================
   SEND MESSAGE
========================= */
function sendChoice(index) {

  const text = window.currentOptions[index];

  console.log("💬 Selected:", text);
  console.log("🧠 Mode:", window.currentMode);
  console.log("🔗 Thread:", threadId);

  track("message_selected", {
    text,
    mode: window.currentMode,
    threadId
  });

  const link = buildLink(text, window.currentMode);

  renderSendScreen(text, link);
}

/* =========================
   BUILD LINK
========================= */
function buildLink(text, mode) {
  return `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${mode}&thread=${threadId}`;
}

/* =========================
   SEND SCREEN
========================= */
function renderSendScreen(text, link) {

  const fullMessage = `${text} 😏\n\n${link}`;

  document.body.innerHTML = `
    <h1>Showing your brave side, I see.</h1>

    <div id="result">

      <div class="tone">${text}</div>

      <br><br>

      <a href="sms:?body=${encodeURIComponent(fullMessage)}" class="button">
        Send it
      </a>

      <a href="mailto:?subject=Nudra&body=${encodeURIComponent(fullMessage)}" class="button">
        Email it
      </a>

      <button class="button" onclick="copyMessage('${encodeURIComponent(fullMessage)}')">
        Copy
      </button>

    </div>
  `;
}

/* =========================
   COPY
========================= */
function copyMessage(encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded));
  alert("Copied!");
}

</script>

</body>
</html>
