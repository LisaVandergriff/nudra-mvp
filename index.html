<!DOCTYPE html>
<html>
<head>
  <title>Lurre</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
      margin: 0;
    }
    
    /* =========================
       DEBUG TAG (TOP LEFT LABEL)
    ========================= */
    .debug {
      position: fixed;
      top: 10px;
      left: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(230,210,192,0.6);
      letter-spacing: 1px;
    }
    
    #app {
  transition: opacity 0.4s ease;
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
  margin-bottom: 40px;
}

.brand-mark {
  font-size: 20px;
  color: rgba(230,210,192,0.9);
  margin-bottom: 14px;
  text-shadow:
    0 0 12px rgba(230,210,192,0.35),
    0 0 30px rgba(230,210,192,0.15);
}
.brand-mark img {
  width: 72px;
  height: auto;
  display: block;
  filter:
    drop-shadow(0 0 10px rgba(230,210,192,0.25))
    drop-shadow(0 0 24px rgba(230,210,192,0.12));
}
    
.brand-name {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  letter-spacing: 10px;
  color: #E6D2C0;
  opacity: 0.92;
}

h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin-bottom: 40px;
}

    .hero {
      font-size: clamp(26px, 4vw, 36px);
      margin-bottom: 20px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(230,210,192,0.35), rgba(230,210,192,0.05));
      box-shadow:
        0 0 25px rgba(230,210,192,0.4),
        0 0 70px rgba(230,210,192,0.2);
      opacity: 0;
      transform: scale(0.9);
    }

    .orb.active {
      animation: flutter 2.8s ease-in-out forwards;
      opacity: 1;
    }

    .orb.fade-out {
      animation: fadeOrb 1.5s ease forwards;
    }

    @keyframes flutter {
      0%   { transform: scale(0.9); opacity: 0; }
      30%  { transform: scale(1.08); }
      55%  { transform: scale(0.98); }
      75%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeOrb {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.85); }
    }

    .whisper {
      font-family: 'Inter', sans-serif;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(10px);
    }

    .whisper.show {
      animation: whisperIn 1.2s ease forwards;
    }

    @keyframes whisperIn {
      0% { opacity: 0; transform: translateY(10px); font-size: 14px; }
      100% { opacity: 1; transform: translateY(0); font-size: 18px; }
    }

    .buttons {
      margin-top: 30px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 999px;
      border: 1px solid rgba(230,210,192,0.25);
      background: rgba(230,210,192,0.06);
      color: #E6D2C0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .button:hover {
      background: rgba(230,210,192,0.14);
      box-shadow: 0 0 20px rgba(230,210,192,0.25);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   DEBUG HELPER
========================= */
function debugTag(text){
  return `<div class="debug">${text}</div>`;
}

/* =========================
   URL STATE (SOURCE OF TRUTH)
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");
const bStep = params.get("bStep");
const turn = params.get("turn") || "A"; 
const loop = parseInt(params.get("loop") || "1");
  
let currentMessage = "";

/* =========================
   INVITE TEXT (A → B)
========================= */
function getInviteText() {
  const invites = [
  "Lurre.\n\n…come play with me",
  "Lurre.\n\nI found something for us",
  "Lurre.\n\nDon’t overthink this",
  "Lurre.\n\nJust open this",
  "Lurre.\n\nThis made me think of you"
];
  return invites[Math.floor(Math.random() * invites.length)];
}

/* =========================
   SCRIPT ENGINE (A INIT ONLY)
========================= */
const scripts = {
  fate: [
    ["Flip a coin and commit.", "You decide. No take-backs.", "No thinking—first idea wins."],
    ["Well… now I’m curious.", "You really went with that?", "Alright… I’m in."]
  ],
  reconnect: [
    ["Tell me what’s been on your mind.", "Let’s reset… just us.", "Come sit with me for a minute."],
    ["I’m here… talk to me.", "That pulled me in.", "Don’t disappear now."]
  ],
  date: [
    ["Tonight doesn’t need a plan.", "Don’t make me overthink this.", "You’ve had my attention all day."],
    ["Careful… I might take you up on that.", "You’re starting something.", "What’s next?"]
  ],
  dinner: [
    ["Stay in tonight", "Go out and see what happens", "Surprise me"],
    ["Now I’m invested.", "You always do this.", "Where is this going?"]
  ]
};

/* =========================
   B OPTIONS (INVITE)
========================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const bOptions = {
  fate: {
    yes: ["Let’s see where this goes","Your move","Alright… surprise me"],
    no: ["Not now… but I’m curious","This isn’t over","Come back to this"]
  },
  reconnect: {
    yes: ["Stay with me","I’m here","Talk to me"],
    no: ["I see you… just not right now.","I want this… just not in this moment.","Give me a minute"]
  },
  date: {
    yes: ["Come closer","Keep going…","I’m listening"],
    no: ["Mmm… bad timing. Don’t stop though.","Not now… but I like this.","Try me again later"]
  },
  dinner: {
    yes: ["Fine… I’m in","Pick for me","Let’s do something easy"],
    no: ["Bad timing… but I like this","Later… don’t lose that energy","Try me again tonight"]
  }
};

/* =========================
   FADE TRANSITION
========================= */
function fadeTo(html){
  const app=document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{app.innerHTML=html;app.style.opacity=1;},200);
}

/* =========================
   A FLOW (INITIATOR)
========================= */
function showHome(){
  fadeTo(`
    ${debugTag("A • HOME")}
    <div class="brand">
  <div class="brand-mark">◉</div>
  <div class="brand-name">LURRE</div>
</div>
    <h1>Welcome back.<br>Come play with me.</h1>
    <div class="orb" style="opacity:1" onclick="showDirections()"></div>
  `);
}

function showDirections(){
  fadeTo(`
    ${debugTag("A • STEP 1")}
    <h1>What are we feeling?</h1>
    <button class="button" onclick="startMode('dinner')">Dinner</button>
    <button class="button" onclick="startMode('date')">Date Night</button>
    <button class="button" onclick="startMode('fate')">Fate</button>
    <button class="button" onclick="startMode('reconnect')">Reconnect</button>
  `);
}

function startMode(mode){
  const options=scripts[mode][0];
  let html=`${debugTag("A • STEP 2")}`;
  options.forEach(o=>{
    html+=`<button class="button" onclick="sendChoice('${o}','${mode}',2)">${o}</button>`;
  });
  fadeTo(html);
}

/* =========================
   SEND ENGINE (HANDOFF)
========================= */
function sendChoice(text,mode,nextStep){

const nextTurn = (turn === "A") ? "B" : "A";
const nextLoop = loop + 1;  

const base = "https://lurre.co";

const isAccepted = accepted === "true" || bStep === "1";

const link = isAccepted
  ? `${base}?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}&accepted=true&turn=${nextTurn}&loop=${nextLoop}`
  : `${base}?msg=${encodeURIComponent(text)}&mode=${mode}&step=${nextStep}&turn=${nextTurn}&loop=${nextLoop}`;
  
const inviteText = getInviteText();
  currentMessage = `${inviteText}\n\n${link}`;

  fadeTo(`
 ${debugTag(turn === "A" ? "A • SEND" : "B • SEND")}
 <a href="sms:?body=${encodeURIComponent(currentMessage)}" class="button">Send</a>
 <button class="button" onclick="copyText()">Copy</button>
`);
}

/* =========================
   B FLOW (RESPONDER)
========================= */

// STEP 1A — YES PATH
if(bStep === "1"){
  let html = `${debugTag("B • STEP 1A")}`;
  html += `<div class="hero">${decodeURIComponent(msg)}</div>`;

  const responses = [
    "Don’t stop",
    "You’ve got me",
    "Careful… keep going"
  ];

  responses.forEach(o=>{
    html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });

  fadeTo(html);
}

/* =========================
   STEP 1B — NO PATH (SOFT DECLINE) 
 ========================= */ 
  
else if(bStep === "2"){
  let html = `${debugTag("B • STEP 1B")}`;
  html += `<div class="hero">${decodeURIComponent(msg)}</div>`;

  const responses = [
    "Not now… but don’t stop",
    "Hold that thought",
    "I like this… just later"
  ];

  responses.forEach(o=>{
  html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
});

fadeTo(html);
}

/* =========================
   B INVITE — FIRST TOUCH 
  ========================= */ 
  
else if(msg && !accepted && !bStep){

const pool = bOptions[mode] || bOptions.date;
const yes = pick(pool.yes);
const no = pick(pool.no);
  
  fadeTo(`
    ${debugTag("B • INVITE")}
    <div class="hero">${decodeURIComponent(msg)}</div>

    <div id="buttons" class="buttons">
<button class="button" onclick="accept()">${yes}</button>
<button class="button" onclick="decline()">${no}</button>
    </div>
  `);
  
  setTimeout(()=>{
  document.getElementById("buttons").style.opacity = 1;
}, 200);
  
}

/* =========================
   SOFT CLOSE — B ENDS
========================= */
else if(msg && accepted && turn === "B" && loop >= 4){

  const endings = {
  dinner: [
    "Careful… we stop there.",
    "Don’t say more… just stay there.",
    "That’s enough to think about."
  ],
  date: [
    "You can come back for that.",
    "Not all at once…",
    "Leave it right there."
  ],
  reconnect: [
    "Stay in that feeling…",
    "Don’t rush it.",
    "We’re not done… just paused."
  ],
  fate: [
    "Interesting… leave it there.",
    "That landed exactly how it should.",
    "Not everything needs more."
  ]
};

  const pool = endings[mode] || endings.dinner;
  const finalLine = pool[Math.floor(Math.random() * pool.length)];

  fadeTo(`
    ${debugTag("B • CLOSE • " + loop + " • " + mode)}
    <div class="hero">${finalLine}</div>
  `);
}
  
/* =========================
   B LOOP — CONTINUED EXCHANGE
========================= */
else if(msg && accepted && turn === "B"){

  let html = `${debugTag("B • LOOP")}<div class="hero">${decodeURIComponent(msg)}</div>`;

  const reactions = {
    "Stay with me.": [
      "Then don’t go quiet on me.",
      "I like where this is.",
      "Keep that energy."
    ],
    "Don’t disappear now.": [
      "I’m right here.",
      "You started this…",
      "So don’t stop."
    ],
    "I’m not done yet.": [
      "Good… neither am I.",
      "Then prove it.",
      "I’m listening."
    ]
  };

  const options = reactions[msg] || [
    "Keep going…",
    "Say that again.",
    "I’m still here."
  ];

  options.forEach(o=>{
    html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
  });

  html += `
  <div style="margin-top:20px; opacity:0.6; font-size:14px; font-family:'Inter', sans-serif;">
    or say something…
  </div>

<input id="freeText"
  placeholder="…"
  onkeydown="if(event.key==='Enter'){sendFreeText()}"
  style="
    width:90%;
    max-width:320px;
    margin:10px auto;
    padding:20px;
    min-height:60px;
    font-size:18px;
    border-radius:999px;
    border:1px solid rgba(230,210,192,0.25);
    background:rgba(230,210,192,0.05);
    color:#E6D2C0;
    display:block;
    text-align:center;
    outline:none;
  " />

  <button class="button" onclick="sendFreeText()">Continue</button>
`;

  fadeTo(html);
}
  
 /* =========================
   A RETURN - LOOP BACK
  ========================= */  

else if(msg && accepted && turn === "A"){

  let html=`${debugTag("A • LOOP")}<div class="hero">${decodeURIComponent(msg)}</div>`;

  const reactions = {
  "Don’t stop": [
    "Careful… I might take you up on that.",
    "You’re asking for trouble.",
    "I was hoping you’d say that."
  ],
  "You’ve got me": [
    "Good… don’t lose that feeling.",
    "Then stay right there with me.",
    "That’s exactly where I wanted you."
  ],
  "Careful… keep going": [
    "Careful isn’t really my style.",
    "You might regret that.",
    "Or you might love it."
  ]
};

const options = reactions[msg] || [
  "Stay with me.",
  "Don’t disappear now.",
  "I’m not done yet."
];

options.forEach(o=>{
  html += `<button class="button" onclick="sendChoice('${o}','${mode}',${step+1})">${o}</button>`;
});

  html += `
  <div style="margin-top:20px; opacity:0.6; font-size:14px; font-family:'Inter', sans-serif;">
    or say something…
  </div>

<input id="freeText"
  placeholder="…"
  onkeydown="if(event.key==='Enter'){sendFreeText()}"
  style="
    width:90%;
    max-width:320px;
    margin:10px auto;
    padding:20px;
    min-height:60px;
    font-size:18px;
    border-radius:999px;
    border:1px solid rgba(230,210,192,0.25);
    background:rgba(230,210,192,0.05);
    color:#E6D2C0;
    display:block;
    text-align:center;
    outline:none;
  " />

  <button class="button" onclick="sendFreeText()">Continue</button>
`;

  fadeTo(html);
}

/* =========================
   FALLBACK 
========================= */
  
else{
  showHome();
}

/* =========================
   ACTIONS
========================= */

function accept(){
  window.location.href=`?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&bStep=1&turn=${turn}`;
}

function decline(){
  window.location.href=`?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&bStep=2&turn=${turn}`;
}

function goHome(){
  window.location.href="/";
}

function sendFreeText(){
  const input = document.getElementById("freeText");
  const text = input.value.trim();
  
  if(!text) return;
  
  sendChoice(text, mode, step+1);
}

function copyText(){
  const temp = document.createElement('textarea');
  temp.value = currentMessage;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand('copy');
  document.body.removeChild(temp);
}

</script>

</body>
</html>
