<!DOCTYPE html>
<html>
<head>
  <title>Nudra</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      background: #000;
      color: #E6D2C0;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      padding: 40px 15px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
    }

    p, .button, .tone {
      font-family: 'Inter', sans-serif;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 16px;
      border-radius: 999px;
      border: none;
      background: #E6D2C0;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    #result {
      margin-top: 30px;
    }

    .hero {
      font-size: 30px;
      margin: 20px 0;
    }

    .tone {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>So… what kind of trouble are we getting into?</h1>
<p>Pick a mood. I’ll take it from there.</p>

<button class="button" onclick="startMode('date')">🖤 Date Night</button>
<button class="button" onclick="startMode('fate')">🎲 Fate</button>
<button class="button" onclick="startMode('reconnect')">💬 Reconnect</button>

<div id="result">Go on… pick something.</div>

<script>

/* =========================
   URL STATE
========================= */
const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const mode = params.get("mode");
const step = parseInt(params.get("step") || "1");
const accepted = params.get("accepted");

/* =========================
   MODE SCRIPTS (NO DUPES)
========================= */
const scripts = {
  reconnect: [
    ["Come sit with me for a minute.", "Tell me what’s been on your mind.", "Let’s reset… just us."],
    ["You always know how to pull me in.", "Alright… I’m here.", "Talk to me… I’m listening."],
    ["That’s exactly what I needed.", "Don’t disappear on me now.", "Stay right here with me."]
  ],

  date: [
    ["You’ve had my attention all day.", "Tonight doesn’t need a plan.", "Don’t make me overthink this."],
    ["Careful… I might take you up on that.", "You’re starting something here.", "Alright… what’s next?"],
    ["No backing out now.", "You win.", "Guess we’re doing this."]
  ],

  fate: [
    ["No thinking—first idea wins.", "Flip a coin and commit.", "You decide. No take-backs."],
    ["Well… now I’m curious.", "You really went with that?", "Okay… I’m in."],
    ["Guess fate made the call.", "That escalated quickly.", "No regrets."]
  ]
};

/* =========================
   STEP OPTIONS
========================= */
function getOptions(mode, step) {
  const script = scripts[mode] || [];
  return script[step - 1] || ["…"];
}

/* =========================
   START MODE
========================= */
function startMode(selectedMode) {
  const options = getOptions(selectedMode, 1);
  window.currentMode = selectedMode;
  window.currentOptions = options;

  render(options, "Pick your move…");
}

/* =========================
   RENDER BUTTONS
========================= */
function render(options, title) {
  let html = `<div class="tone">${title}</div><br>`;

  options.forEach((opt, i) => {
    html += `<button class="button" onclick="sendChoice(${i})">${opt}</button>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* =========================
   SEND MESSAGE (LINK ONLY)
========================= */
function sendChoice(i) {
  const text = window.currentOptions[i];
  const nextStep = step + 1;

  const link = `https://nudra-mvp.vercel.app/?msg=${encodeURIComponent(text)}&mode=${window.currentMode}&step=${nextStep}&accepted=true`;

  document.body.innerHTML = `
    <h1>Send it…</h1>
    <div class="hero">${text}</div>

    <a href="sms:?body=${encodeURIComponent(link)}" class="button">Send it</a>
    <a href="mailto:?subject=Nudra&body=${encodeURIComponent(link)}" class="button">Email it</a>
  `;
}

/* =========================
   INCOMING FLOW
========================= */
if (msg && !accepted) {

  // ONE-TIME ACCEPT SCREEN
  document.body.innerHTML = `
    <h1>Psst…</h1>

    <div class="hero">${decodeURIComponent(msg)}</div>
    <div class="tone">Do you want to play?</div>

    <a href="?msg=${encodeURIComponent(msg)}&mode=${mode}&step=${step}&accepted=true" class="button">Yes</a>
    <a href="/" class="button">Not now</a>
  `;

} else if (msg && accepted) {

  // CONTINUATION FLOW
  const options = getOptions(mode, step);

  window.currentMode = mode;
  window.currentOptions = options;

  document.body.innerHTML = `
    <h1>Showing your brave side, I see.</h1>

    <div class="hero">${decodeURIComponent(msg)}</div>
    <div class="tone">Your turn…</div>

    <div id="result"></div>
  `;

  render(options, "");

}

</script>

</body>
</html>
